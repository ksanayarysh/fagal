<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FAGAL{% endblock %} · FAGAL PDV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body>
<nav class="nav">
  <div class="nav-logo">FAGAL <span>PDV</span></div>
  <div class="nav-spacer"></div>
  <div class="nav-links" id="navLinks">
    <a href="/vendas" class="{% if active == 'vendas' %}active{% endif %}">Vendas</a>
    <a href="/vendas/nova" class="{% if active == 'nova' %}active{% endif %}">+ Nova</a>
    <a href="/materiais" class="{% if active == 'materiais' %}active{% endif %}">Materiais</a>
    <a href="/estoque" class="{% if active == 'estoque' %}active{% endif %}">Estoque</a>
    <a href="/relatorios" class="{% if active == 'relatorios' %}active{% endif %}">Relatórios</a>
    <a href="/categorias" class="{% if active == 'categorias' %}active{% endif %}">Categorias</a>
    <a href="/logout" class="nav-logout">Sair</a>
  </div>
  <button class="nav-burger" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu">☰</button>
</nav>
<div class="main">
  {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
<script>
// Force responsive state on load and resize (Firefox fix)
function applyResponsive() {
  const isMobile = window.innerWidth <= 768;
  document.querySelectorAll('.desktop-only').forEach(el => {
    el.style.display = isMobile ? 'none' : '';
  });
  document.querySelectorAll('.mobile-only').forEach(el => {
    el.style.display = isMobile ? 'flex' : 'none';
  });
}
document.addEventListener('DOMContentLoaded', applyResponsive);
window.addEventListener('resize', applyResponsive);
</script>
</body>
</html>
