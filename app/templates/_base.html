<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FAGAL{% endblock %} · FAGAL PDV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body>
<nav class="nav">
  <div class="nav-logo">FAGAL <span>PDV</span></div>
  <div class="nav-spacer"></div>
  <button class="nav-burger" onclick="toggleMenu()" aria-label="Menu">☰</button>
  <div class="nav-links" id="navLinks">
    <a href="/vendas" class="{% if active == 'vendas' %}active{% endif %}">Vendas</a>
    <a href="/vendas/nova" class="{% if active == 'nova' %}active{% endif %}">+ Nova venda</a>
    <a href="/materiais" class="{% if active == 'materiais' %}active{% endif %}">Materiais</a>
    <a href="/estoque" class="{% if active == 'estoque' %}active{% endif %}">Estoque</a>
    <a href="/categorias" class="{% if active == 'categorias' %}active{% endif %}">Categorias</a>
    <a href="/logout" class="nav-logout">Sair</a>
  </div>
</nav>
<script>
function toggleMenu() {
  document.getElementById('navLinks').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const links = document.getElementById('navLinks');
  const burger = document.querySelector('.nav-burger');
  if (!links.contains(e.target) && !burger.contains(e.target)) {
    links.classList.remove('open');
  }
});
</script>
<div class="main">
  {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
