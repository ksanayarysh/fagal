{% extends "_base.html" %}
{% block title %}Nova Venda{% endblock %}

{% block head %}
<style>
.orca-item {
  display: grid;
  grid-template-columns: 2fr 1fr 36px;
  gap: 10px;
  align-items: start;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
}
.orca-item-inner { display: flex; flex-direction: column; gap: 6px; }
.orca-item-right { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.orca-subtotal { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--accent); }
.dim-row { display: flex; gap: 6px; align-items: center; font-size:.82rem; color:var(--muted); }
.dim-row input { width: 110px; }
.qty-row { display: flex; gap: 6px; align-items: center; }
.qty-row input { width: 90px; }
.mat-name { font-weight: 600; font-size: .92rem; }
.mat-unit { font-family: var(--mono); font-size: .75rem; }
.remove-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 4px;
  align-self: flex-start;
}
.remove-btn:hover { color: var(--red); }
.total-bar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 16px;
  padding: 16px 0;
  border-top: 2px solid var(--border);
  margin-top: 8px;
}
.total-label { color: var(--muted); font-size: .85rem; }
.total-val { font-family: var(--mono); font-size: 1.6rem; font-weight: 800; color: var(--accent); }

.material-select-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
}
.material-select-wrap select { flex: 1; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Nova venda</div>
    <div class="page-subtitle">Monte o orçamento e registre</div>
  </div>
  <a href="/vendas" class="btn btn-secondary">← Voltar</a>
</div>

<div class="card mb-16">
  <div class="grid-2">
    <div class="form-group">
      <label class="form-label">Cliente *</label>
      <input type="text" id="clientName" class="form-control" placeholder="Nome do cliente">
    </div>
    <div class="form-group">
      <label class="form-label">Observação</label>
      <input type="text" id="noteField" class="form-control" placeholder="Ex: Portão da garagem, Rua X...">
    </div>
  </div>
</div>

<div class="card mb-16">
  <div style="font-weight:700;margin-bottom:14px;">Materiais</div>

  <div style="margin-bottom:12px;">
    <input type="text" id="matSearch" class="form-control"
           placeholder="Buscar material..." oninput="filterMaterials(this.value)" autocomplete="off">
  </div>
  <div id="matGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-bottom:16px;max-height:320px;overflow-y:auto;"></div>

  <div id="itemsList"></div>

  <div class="total-bar" style="flex-direction:column;align-items:flex-end;gap:6px;">
    <div style="display:flex;gap:16px;align-items:center;">
      <span class="total-label">Materiais</span>
      <span class="text-mono" id="materialsTotal" style="font-size:1.1rem;">R$ 0,00</span>
    </div>
    <div style="display:flex;gap:16px;align-items:center;" id="laborRow" style="display:none;">
      <span class="total-label">Mão de obra</span>
      <span class="text-mono" id="laborTotal" style="font-size:1.1rem;">R$ 0,00</span>
    </div>
    <div style="display:flex;gap:16px;align-items:center;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;">
      <span class="total-label">TOTAL</span>
      <span class="total-val" id="grandTotal">R$ 0,00</span>
    </div>
  </div>
</div>

<div class="card mb-16">
  <div style="font-weight:700;margin-bottom:14px;">Mão de obra</div>
  <div class="grid-2">
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input type="text" id="laborDesc" class="form-control" placeholder="Ex: Instalação, solda, pintura...">
    </div>
    <div class="form-group">
      <label class="form-label">Valor (R$)</label>
      <input type="text" inputmode="decimal" id="laborVal" class="form-control" placeholder="0,00"
             oninput="updateLaborTotal()" onkeyup="commaToPoint(this)">
    </div>
  </div>
</div>

<div class="card">
  <div class="flex items-center gap-8 mb-16">
    <input type="checkbox" id="paidCheck" style="width:18px;height:18px;accent-color:var(--green);">
    <label for="paidCheck" style="font-weight:600;">Marcar como pago</label>
  </div>
  <button class="btn btn-primary" onclick="submitSale()" style="min-width:160px;">
    💾 Registrar venda
  </button>
</div>
{% endblock %}

{% block scripts %}
<script>
const materials = {{ materials | tojson }};
let items = [];

// unit display
const UNIT_LABEL = {m2:'m²', m3:'m³', m:'m', un:'un', kg:'kg'};
const NEEDS_DIM = {m2: true, m3: false}; // m2 = L×W, m3 = L×W×H would be complex, keep as qty for now

function fmtBRL(v) {
  return 'R$ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}

function addItem(matId) {
  const mat = materials.find(m => m.id == matId);
  if (!mat) return;
  const item = {
    id: Date.now(),
    material_id: mat.id,
    material_name: mat.name,
    unit: mat.unit,
    unit_price: parseFloat(mat.price),
    length: 1,
    width: 1,
    qty: 1,
    subtotal: parseFloat(mat.price),
  };
  items.push(item);
  renderItems();
  // clear search
  document.getElementById('matSearch').value = '';
  filterMaterials('');
}

function filterMaterials(q) {
  const grid = document.getElementById('matGrid');
  const query = q.trim().toLowerCase();
  const filtered = query
    ? materials.filter(m => m.name.toLowerCase().includes(query) || m.category.toLowerCase().includes(query))
    : materials;

  if (!filtered.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:.875rem;padding:8px;">Nenhum material encontrado</div>';
    return;
  }

  const UNIT = {m2:'m²',m3:'m³',m:'m',un:'un',kg:'kg'};
  grid.innerHTML = filtered.map(m => {
    const stock = m.qty_stock > 0
      ? `<span style="color:var(--green);font-size:.78rem;">▲ ${m.qty_stock % 1 === 0 ? m.qty_stock : m.qty_stock.toFixed(2)} ${UNIT[m.unit]||m.unit}</span>`
      : `<span style="color:var(--muted);font-size:.78rem;">sem estoque</span>`;
    return `<div onclick="addItem(${m.id})" style="
        background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
        padding:10px 12px;cursor:pointer;transition:border-color .15s;"
        onmouseover="this.style.borderColor='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)'">
      <div style="font-weight:600;font-size:.9rem;margin-bottom:3px;">${m.name}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-family:var(--mono);color:var(--accent);font-size:.95rem;">R$ ${m.price.toFixed(2).replace('.',',')}/${UNIT[m.unit]||m.unit}</span>
        ${stock}
      </div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:2px;">${m.category}</div>
    </div>`;
  }).join('');
}

function renderItems() {
  const el = document.getElementById('itemsList');
  if (!items.length) {
    el.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px 0;font-size:.875rem;">Nenhum material adicionado</div>';
    updateTotal();
    return;
  }

  el.innerHTML = items.map(item => {
    const needsDim = item.unit === 'm2';
    const needsLinear = item.unit === 'm';
    const label = UNIT_LABEL[item.unit] || item.unit;

    let qtyHtml = '';
    if (needsDim) {
      qtyHtml = `
        <div class="dim-row">
          <span>Largura:</span>
          <input type="text" inputmode="decimal" class="form-control" value="${item.width}"
                 oninput="updateDim(${item.id},'width',this.value)" onkeyup="commaToPoint(this)"> m
          <span style="margin-left:4px;">× Comprimento:</span>
          <input type="text" inputmode="decimal" class="form-control" value="${item.length}"
                 oninput="updateDim(${item.id},'length',this.value)" onkeyup="commaToPoint(this)"> m
        </div>
        <div class="dim-area" style="font-size:.8rem;color:var(--muted);">= ${(item.length * item.width).toFixed(3)} m²</div>
      `;
    } else {
      qtyHtml = `
        <div class="qty-row">
          <input type="number" class="form-control" step="${item.unit==='un'?'1':'0.01'}"
                 min="${item.unit==='un'?'1':'0.01'}" value="${item.qty}"
                 oninput="updateQty(${item.id},this.value)">
          <span class="mat-unit">${label}</span>
        </div>
      `;
    }

    return `
      <div class="orca-item" data-item-id="${item.id}">
        <div class="orca-item-inner">
          <div class="mat-name">${item.material_name}</div>
          <div style="font-size:.8rem;color:var(--muted);">R$ ${item.unit_price.toFixed(2).replace('.',',')} / ${label}</div>
          ${qtyHtml}
        </div>
        <div class="orca-item-right">
          <div class="orca-subtotal">${fmtBRL(item.subtotal)}</div>
        </div>
        <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
      </div>
    `;
  }).join('');

  updateTotal();
}

function commaToPoint(el) {
  const pos = el.selectionStart;
  const hadComma = el.value.includes(',');
  el.value = el.value.replace(',', '.');
  if (hadComma) el.setSelectionRange(pos, pos);
}

function updateDim(id, field, val) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item[field] = parseFloat(val.replace(',','.')) || 0;
  item.qty = item.length * item.width;
  item.subtotal = item.qty * item.unit_price;
  // update only subtotal display, not full re-render
  const row = document.querySelector(`[data-item-id="${id}"]`);
  if (row) {
    row.querySelector('.orca-subtotal').textContent = fmtBRL(item.subtotal);
    const area = row.querySelector('.dim-area');
    if (area) area.textContent = '= ' + item.qty.toFixed(3) + ' m²';
  }
  updateTotal();
}

function updateQty(id, val) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.qty = parseFloat(val.replace(',','.')) || 0;
  item.subtotal = item.qty * item.unit_price;
  const row = document.querySelector(`[data-item-id="${id}"]`);
  if (row) row.querySelector('.orca-subtotal').textContent = fmtBRL(item.subtotal);
  updateTotal();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems();
}

function getLaborVal() {
  return parseFloat((document.getElementById('laborVal').value||'0').replace(',','.')) || 0;
}

function updateLaborTotal() {
  const labor = getLaborVal();
  const laborRow = document.getElementById('laborRow');
  if (labor > 0) {
    laborRow.style.display = 'flex';
    document.getElementById('laborTotal').textContent = fmtBRL(labor);
  } else {
    laborRow.style.display = 'none';
  }
  updateTotal();
}

function updateTotal() {
  const matTotal = items.reduce((s, i) => s + i.subtotal, 0);
  const labor = getLaborVal();
  document.getElementById('materialsTotal').textContent = fmtBRL(matTotal);
  document.getElementById('grandTotal').textContent = fmtBRL(matTotal + labor);
}

async function submitSale() {
  const client = document.getElementById('clientName').value.trim();
  if (!client) { alert('Informe o nome do cliente!'); return; }
  if (!items.length) { alert('Adicione pelo menos um material!'); return; }

  const paid = document.getElementById('paidCheck').checked;
  const note = document.getElementById('noteField').value.trim();

  const labor = getLaborVal();
  const laborDesc = document.getElementById('laborDesc').value.trim();

  const payload = {
    client,
    note,
    paid,
    labor,
    labor_desc: laborDesc,
    items: items.map(i => ({
      material_id: i.material_id,
      material_name: i.material_name,
      unit: i.unit,
      qty: i.qty,
      unit_price: i.unit_price,
      subtotal: i.subtotal,
    }))
  };

  const r = await fetch('/vendas/nova', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload),
  });
  const data = await r.json();
  if (data.ok) {
    window.location.href = `/vendas/${data.sale_id}`;
  } else {
    alert('Erro: ' + data.error);
  }
}

// init
renderItems();
filterMaterials('');
</script>
{% endblock %}
