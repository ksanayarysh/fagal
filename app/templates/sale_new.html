{% extends "_base.html" %}
{% block title %}Nova Venda{% endblock %}

{% block head %}
<style>
/* ── LAYOUT ── */
.sale-layout {
  display: grid;
  grid-template-columns: 1fr 460px;
  gap: 20px;
  align-items: start;
}

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input { padding-left: 36px; }
.search-icon { position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none; }
.results-label { font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;padding:0 4px; }

/* ── MATERIAL ROWS ── */
.mat-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.mat-row:last-child { border-bottom: none; }
.mat-row:hover { background: var(--surface2); }
.mat-info { flex: 1; min-width: 0; }
.mat-row-name { font-weight: 600; font-size: .95rem; }
.mat-row-cat { font-size: .78rem; color: var(--muted); margin-top: 1px; }
.mat-row-price { font-family: var(--mono); color: var(--accent); font-size: .95rem; white-space: nowrap; }
.mat-stock-ok { color: var(--green); font-size: .75rem; }
.mat-stock-no { color: var(--muted); font-size: .75rem; }
.add-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: 7px 16px;
  cursor: pointer;
  font-size: .85rem;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, border-color .15s, color .15s;
}
.add-btn:hover { background: var(--accent); color: #111; border-color: var(--accent); }

/* ── CART PANEL ── */
.cart-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: sticky;
  top: 16px;
}
.cart-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 1rem;
}
.cart-badge {
  background: var(--accent); color: #111;
  border-radius: 20px; padding: 2px 9px;
  font-size: .8rem; font-weight: 800;
}
.cart-client { padding: 12px 18px; border-bottom: 1px solid var(--border); }
.cart-client input { margin-bottom: 6px; }
.cart-paid-row { display:flex; align-items:center; gap:8px; margin-top:6px; font-size:.875rem; font-weight:600; }

.cart-items { max-height: 300px; overflow-y: auto; }
.cart-empty { padding: 24px 18px; text-align: center; color: var(--muted); font-size:.875rem; }

.cart-item { padding: 10px 18px; border-bottom: 1px solid var(--border); }
.cart-item-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:7px; gap:8px; }
.cart-item-name { font-weight: 600; font-size: .9rem; }
.cart-remove { background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0;flex-shrink:0; }
.cart-remove:hover { color: var(--red); }
.cart-item-bottom { display:flex; justify-content:space-between; align-items:center; gap:8px; }
.cart-item-sub { font-family:var(--mono); font-weight:700; color:var(--accent); font-size:.95rem; white-space:nowrap; }
.cart-price-hint { font-size:.75rem; color:var(--muted); margin-top:3px; }

.cart-dim { display:flex; flex-wrap:wrap; align-items:center; gap:5px; font-size:.82rem; color:var(--muted); }
.cart-dim input { width:70px; padding:5px 7px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font); font-size:.9rem; }
.cart-dim input:focus { outline:none; border-color:var(--accent); }
.cart-qty input { width:80px; padding:5px 7px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font); font-size:.9rem; }
.cart-qty input:focus { outline:none; border-color:var(--accent); }
.cart-qty { display:flex; align-items:center; gap:6px; font-size:.85rem; color:var(--muted); }

.dim-area { font-size:.75rem; color:var(--muted); margin-top:2px; }

.cart-labor { padding: 12px 18px; border-top: 1px solid var(--border); }
.cart-labor-title { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:7px; }
.cart-labor input { margin-bottom: 6px; }

.cart-totals { padding: 10px 18px; border-top: 2px solid var(--border); }
.cart-total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; font-size:.875rem; }
.cart-total-row.grand { font-size:1.2rem; font-weight:800; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.cart-total-row.grand span:last-child { font-family:var(--mono); color:var(--accent); }

.cart-actions { padding: 10px 18px 14px; display:flex; flex-direction:column; gap:8px; }
.cart-actions .btn { width:100%; justify-content:center; }

/* ── CART SECTIONS ── */
.cart-section { border-bottom: 2px solid var(--border); }
.cart-section:last-child { border-bottom: none; }
.cart-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  cursor: pointer;
  user-select: none;
}
.cart-section-title { font-size: .92rem; font-weight: 800; color: var(--text); letter-spacing: .01em; }
.cart-section-arrow { font-size: .75rem; color: var(--muted); transition: transform .2s; }
.cart-section-arrow.collapsed { transform: rotate(-90deg); }
.cart-section-subtotal { font-family: var(--mono); color: var(--accent); font-size: .95rem; font-weight: 700; }
.cart-section-body { }
.cart-section-body.collapsed { display: none; }
.cart-section.active-section > .cart-section-header {
  border-left-color: var(--green);
}
.cart-section.active-section > .cart-section-header .cart-section-title {
  color: var(--green);
}
.active-section-indicator {
  font-size: .7rem; color: var(--green); font-weight: 700;
  padding: 1px 6px; border: 1px solid var(--green);
  border-radius: 10px; margin-left: 4px;
}
.cart-section-labor {
  padding: 8px 18px 10px;
  border-top: 1px dashed var(--border);
  display: flex; align-items: center; gap: 8px;
}
.cart-section-labor-label { font-size: .75rem; color: var(--muted); white-space: nowrap; }
.cart-section-labor input { flex: 1; padding: 5px 8px; font-size: .85rem; }
.cart-section-labor-val { font-family: var(--mono); font-size: .85rem; color: var(--accent); white-space: nowrap; min-width: 70px; text-align: right; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .sale-layout { grid-template-columns: 1fr; }

  .cart-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    border-radius: 16px 16px 0 0;
    border: none;
    border-top: 2px solid var(--accent);
    transform: translateY(calc(100% - 58px));
    transition: transform .3s ease;
    z-index: 100;
    max-height: 92vh;
    overflow-y: auto;
  }
  .cart-panel.open { transform: translateY(0); }
  .cart-header { cursor: pointer; }
  .cart-header::after { content: '▲'; font-size:.75rem; color:var(--muted); }
  .cart-panel.open .cart-header::after { content: '▼'; }

  .cart-bottom-spacer { height: 70px; }
}
.cat-pills { display:flex; flex-wrap:wrap; gap:6px; padding:0 16px 10px; }
.cat-pill {
  padding:5px 14px; border-radius:20px; font-size:.8rem; font-weight:600;
  border:1px solid var(--border); background:var(--surface2); color:var(--muted);
  cursor:pointer; transition:all .15s;
}
.cat-pill:hover { border-color:var(--accent); color:var(--accent); }
.cat-pill.active { background:var(--accent); color:#111; border-color:var(--accent); }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">{{ page_title }}</div>
    <div class="page-subtitle">{{ page_subtitle }}</div>
  </div>
  <a href="/vendas" class="btn btn-secondary">← Voltar</a>
</div>

<div class="sale-layout">
  <!-- LEFT -->
  <div>
    <div class="card" style="padding:14px 0 0;">
      <div style="padding:0 16px 10px;">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="matSearch" class="form-control"
                 placeholder="Buscar material..." oninput="filterMaterials(this.value)" autocomplete="off">
        </div>
        <div class="results-label" id="resultsLabel"></div>
      </div>
      <div class="cat-pills" id="catPills"></div>
      <div id="matList"></div>

      🛒 Carrinho
      <span class="cart-badge" id="cartCount">0</span>
    </div>

    <div class="cart-client">

      <input type="text" id="phoneField" class="form-control" placeholder="Telefone">
      <input type="text" id="addressField" class="form-control" placeholder="Endereço da obra">
      <input type="text" id="noteField" class="form-control" placeholder="Observação">
      <div class="cart-paid-row">
        <input type="checkbox" id="paidCheck" style="width:17px;height:17px;accent-color:var(--green);">

    <div style="padding:8px 18px;border-bottom:1px solid var(--border);">

        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.858L0 24l6.293-1.51A11.933 11.933 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a10 10 0 01-5.006-1.346l-.36-.214-3.733.923.955-3.643-.232-.373A9.973 9.973 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>

        Compartilhar orçamento
      </button>
    </div>
  </div>
</div>
<div class="cart-bottom-spacer"></div>
{% endblock %}

{% block scripts %}
<script>
const materials = {{ materials | tojson }};
let items = [];          // each item has section_id
let sections = [];       // [{id, name, category}]
let labors = {};         // { section_id: { desc, val } }
let activeSectionId = null; // which section gets new items
let activeCategory = null;
let sectionCounter = 0;

function newSectionId() { return 'sec_' + (++sectionCounter); }

function getOrCreateSection(category) {
  // find existing section for this category that has no custom name
  let sec = sections.find(s => s.category === category && !s.custom);
  if (!sec) {
    sec = { id: newSectionId(), name: category, category, custom: false };
    sections.push(sec);
  }
  return sec;
}

function addSection(category) {
  const count = sections.filter(s => s.category === category).length + 1;
  const sec = { id: newSectionId(), name: category + ' ' + count, category, custom: true };
  sections.push(sec);
  renderCart();
}
const UNIT = {m2:'m²', m3:'m³', m:'m', un:'un', kg:'kg'};

function fmtBRL(v) {
  return 'R$ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function commaToPoint(el) {
  const pos = el.selectionStart;
  const had = el.value.includes(',');
  el.value = el.value.replace(',', '.');
  if (had) try { el.setSelectionRange(pos, pos); } catch(e){}
}

/* ─── MOBILE CART TOGGLE ─── */
function toggleCartMobile() {
  if (window.innerWidth <= 768) {
    document.getElementById('cartPanel').classList.toggle('open');
  }
}

/* ─── MATERIAL LIST ─── */
function buildCatPills() {
  const cats = ['Todos', ...new Set(materials.map(m => m.category))];
  const el = document.getElementById('catPills');
  el.innerHTML = cats.map(c => {
    if (c === 'Todos') return `<span class="cat-pill active" onclick="selectCat('Todos')" id="pill-Todos">Todos</span>`;
    const key = c.replace(/ /g,'_');
    return `<span class="cat-pill" id="pill-${key}" onclick="selectCat('${c}')">📁 ${c}</span>`;
  }).join('');
}

function selectCat(cat) {
  activeCategory = cat === 'Todos' ? null : cat;
  document.querySelectorAll('.cat-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === cat);
  });
  filterMaterials(document.getElementById('matSearch').value);
}

function filterMaterials(q) {
  const query = (q||'').trim().toLowerCase();
  let filtered = activeCategory ? materials.filter(m => m.category === activeCategory) : materials;
  if (query) filtered = filtered.filter(m => m.name.toLowerCase().includes(query) || m.category.toLowerCase().includes(query));
  document.getElementById('resultsLabel').textContent =
    `${filtered.length} material${filtered.length!==1?'is':''}${activeCategory?' · '+activeCategory:''}`;
  renderMatList(filtered);
}

function addAllFromCat(cat) {
  const catMats = materials.filter(m => m.category === cat);
  catMats.forEach(m => addItem(m.id));
}

function renderMatList(list) {
  const el = document.getElementById('matList');
  if (!list.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">Nenhum material encontrado</div>';
    return;
  }
  // group by category for display
  const listCats = [...new Set(list.map(m => m.category))];
  el.innerHTML = listCats.map(cat => {
    const catMats = list.filter(m => m.category === cat);
    const hasSections = sections.some(s => s.category === cat);
    const catHeader = hasSections
      ? '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 16px 2px;border-top:1px solid var(--border);">'
        + '<span style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);">' + cat + '</span>'
        + '<button onclick="addSectionForCat(\'' + cat + '\')" style="background:none;border:1px solid var(--border);color:var(--accent);border-radius:6px;padding:3px 10px;font-size:.75rem;font-weight:700;cursor:pointer;">+ Nova seção ' + cat + '</button>'
        + '</div>'
      : '';
    return catHeader + catMats.map(m => {
    const u = UNIT[m.unit]||m.unit;
    const stockHtml = m.qty_stock > 0
      ? `<span class="mat-stock-ok">▲ ${Number.isInteger(m.qty_stock)?m.qty_stock:m.qty_stock.toFixed(2)} ${u}</span>`
      : `<span class="mat-stock-no">sem estoque</span>`;
    return `<div class="mat-row" id="matrow-${m.id}">
      <div class="mat-info">
        <div class="mat-row-name">${m.name}</div>
        <div class="mat-row-cat">${m.category} · ${stockHtml}</div>
      </div>
      <span class="mat-row-price">${fmtBRL(m.price)}/${u}</span>
      <button class="add-btn" onclick="addItem(${m.id})">+ Carrinho</button>
    </div>`;
  }).join('');
  }).join('');
}

/* ─── CART ─── */
function addItem(matId) {
  const mat = materials.find(m => m.id == matId);
  if (!mat) return;
  // only increment if same section exists (default section for category)
  const defaultSec = sections.find(s => s.category === mat.category && !s.custom);
  const existing = defaultSec ? items.find(i => i.material_id == matId && i.section_id === defaultSec.id) : null;
  if (existing) {
    if (existing.unit === 'm2') { existing.length += 1; existing.qty = existing.length * existing.width; }
    else if (existing.unit === 'm3') { existing.length += 1; existing.qty = existing.length * existing.width * existing.height; }
    else existing.qty += 1;
    existing.subtotal = existing.qty * existing.unit_price;
    renderCart();
    return;
  }
  // use active section if set, otherwise getOrCreate for this category
  let sec;
  if (activeSectionId) {
    sec = sections.find(s => s.id === activeSectionId);
  }
  if (!sec) {
    sec = getOrCreateSection(mat.category);
    if (!activeSectionId) activeSectionId = sec.id;
  }
  items.push({
    id: Date.now(),
    section_id: sec.id,
    material_id: mat.id,
    material_name: mat.name,
    category: mat.category,
    unit: mat.unit,
    unit_price: parseFloat(mat.price),
    length: 1, width: 1, height: 1, qty: 1,
    subtotal: parseFloat(mat.price),
  });
  renderCart();
  // on mobile, open cart when first item added
  if (window.innerWidth <= 768 && items.length === 1) {
    document.getElementById('cartPanel').classList.add('open');
  }
}

function renderCart() {
  const el = document.getElementById('cartItems');
  document.getElementById('cartCount').textContent = items.length;
  filterMaterials(document.getElementById('matSearch').value);

  if (!items.length) {
    el.innerHTML = '<div class="cart-empty">Adicione materiais da lista</div>';
    updateTotals();
    return;
  }

  // group by sections (preserving order) - show all sections
  const activeSections = sections;

  el.innerHTML = activeSections.map(sec => {
    const cat = sec.category;
    const catItems = items.filter(i => i.section_id === sec.id);
    const lab = labors[sec.id] || {desc:'', val:0};
    const matSub = catItems.reduce((s,i) => s+i.subtotal, 0);
    const totalSec = matSub + (lab.val||0);

    const rows = catItems.map(item => {
      const u = UNIT[item.unit]||item.unit;
      let controls = '';
      if (item.unit === 'm2') {
        controls = `<div class="cart-dim">
          <span>L:</span><input type="text" inputmode="decimal" value="${item.width}"
            oninput="updateDim(${item.id},'width',this.value)" onkeyup="commaToPoint(this)"><span>m</span>
          <span>× C:</span><input type="text" inputmode="decimal" value="${item.length}"
            oninput="updateDim(${item.id},'length',this.value)" onkeyup="commaToPoint(this)"><span>m</span>
        </div>
        <div class="dim-area">= ${(item.length*item.width).toFixed(3)} m²</div>`;
      } else if (item.unit === 'm3') {
        controls = `<div class="cart-dim">
          <span>L:</span><input type="text" inputmode="decimal" value="${item.width}"
            oninput="updateDim3(${item.id},'width',this.value)" onkeyup="commaToPoint(this)"><span>m</span>
          <span>× C:</span><input type="text" inputmode="decimal" value="${item.length}"
            oninput="updateDim3(${item.id},'length',this.value)" onkeyup="commaToPoint(this)"><span>m</span>
          <span>× A:</span><input type="text" inputmode="decimal" value="${item.height}"
            oninput="updateDim3(${item.id},'height',this.value)" onkeyup="commaToPoint(this)"><span>m</span>
        </div>
        <div class="dim-area">= ${(item.length*item.width*item.height).toFixed(3)} m³</div>`;
      } else {
        controls = `<div class="cart-qty">
          <input type="text" inputmode="decimal" value="${item.qty}"
            oninput="updateQty(${item.id},this.value)" onkeyup="commaToPoint(this)">
          <span>${u}</span>
        </div>`;
      }
      return `<div class="cart-item" data-item-id="${item.id}">
        <div class="cart-item-top">
          <div class="cart-item-name">${item.material_name}</div>
          <button class="cart-remove" onclick="removeItem(${item.id})">✕</button>
        </div>
        <div class="cart-item-bottom">
          <div>${controls}</div>
          <div class="cart-item-sub orca-subtotal">${fmtBRL(item.subtotal)}</div>
        </div>
        <div class="cart-price-hint">${fmtBRL(item.unit_price)}/${u}</div>
      </div>`;
    }).join('');

    const secKey = sec.id;
    return `<div class="cart-section" data-sec="${sec.id}">
      <div class="cart-section-header">
        <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">
          <span onclick="toggleSection('${secKey}')" style="cursor:pointer;">
            <span class="cart-section-arrow" id="arrow-${secKey}">▼</span>
          </span>
          <span class="cart-section-title" id="sectitle-${secKey}"
                onclick="setActiveSection('${sec.id}')"
                title="Clique para ativar esta seção">📁 ${sec.name}</span>
          ${activeSectionId === sec.id ? '<span class="active-section-indicator">ativo</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="cart-section-subtotal" id="sec-total-${secKey}">${fmtBRL(totalSec)}</span>
          <button onclick="renameSection('${sec.id}')" title="Renomear"
                  style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:2px 4px;">✏️</button>
          <button onclick="removeSection('${sec.id}')" title="Remover seção"
                  style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:2px 4px;">🗑</button>

        </div>
      </div>
      <div class="cart-section-body" id="body-${secKey}">
      ${rows}
      <div class="cart-section-labor">
        <span class="cart-section-labor-label">🔧 M.O.:</span>
        <input type="text" inputmode="decimal" class="form-control"
               placeholder="R$ 0,00"
               value="${lab.val > 0 ? lab.val : ''}"
               oninput="updateLabor('${sec.id}','val',this.value)"
               onkeyup="commaToPoint(this)"
               style="max-width:90px;padding:5px 8px;font-size:.85rem;">
        <input type="text" class="form-control"
               placeholder="Descrição"
               value="${lab.desc||''}"
               oninput="updateLabor('${sec.id}','desc',this.value)"
               style="font-size:.85rem;padding:5px 8px;">
        <span class="cart-section-labor-val" id="sec-labor-${secKey}">${lab.val>0?fmtBRL(lab.val):''}</span>
        </div>
    </div>
    </div>`;
    }).join('');

  updateTotals();
}


function updateDim(id, field, val) {
  const item = items.find(i => i.id===id); if (!item) return;
  item[field] = parseFloat(val.replace(',','.')) || 0;
  item.qty = item.length * item.width;
  item.subtotal = item.qty * item.unit_price;
  const row = document.querySelector(`[data-item-id="${id}"]`);
  if (row) {
    row.querySelector('.orca-subtotal').textContent = fmtBRL(item.subtotal);
    const a = row.querySelector('.dim-area'); if (a) a.textContent = '= '+item.qty.toFixed(3)+' m²';
  }
  updateTotals();
}

function updateDim3(id, field, val) {
  const item = items.find(i => i.id===id); if (!item) return;
  item[field] = parseFloat(val.replace(',','.')) || 0;
  item.qty = item.length * item.width * item.height;
  item.subtotal = item.qty * item.unit_price;
  const row = document.querySelector(`[data-item-id="${id}"]`);
  if (row) {
    row.querySelector('.orca-subtotal').textContent = fmtBRL(item.subtotal);
    const a = row.querySelector('.dim-area'); if (a) a.textContent = '= '+item.qty.toFixed(3)+' m³';
  }
  updateTotals();
}

function updateQty(id, val) {
  const item = items.find(i => i.id===id); if (!item) return;
  item.qty = parseFloat(String(val).replace(',','.')) || 0;
  item.subtotal = item.qty * item.unit_price;
  const row = document.querySelector(`[data-item-id="${id}"]`);
  if (row) row.querySelector('.orca-subtotal').textContent = fmtBRL(item.subtotal);
  updateTotals();
}

function removeItem(id) {
  items = items.filter(i => i.id!==id);
  renderCart();
}

function setActiveSection(secId) {
  activeSectionId = secId;
  renderCart();
}

function toggleSection(secKey) {
  const body = document.getElementById('body-'+secKey);
  const arrow = document.getElementById('arrow-'+secKey);
  if (body) body.classList.toggle('collapsed');
  if (arrow) arrow.classList.toggle('collapsed');
}

function updateLabor(secId, field, val) {
  if (!labors[secId]) labors[secId] = {desc:'', val:0};
  if (field === 'val') labors[secId].val = parseFloat(val.replace(',','.')) || 0;
  else labors[secId].desc = val;
  const secItems = items.filter(i => i.section_id === secId);
  const matSub = secItems.reduce((s,i) => s+i.subtotal, 0);
  const total = matSub + (labors[secId].val||0);
  const st = document.getElementById('sec-total-'+secId);
  if (st) st.textContent = fmtBRL(total);
  const sl = document.getElementById('sec-labor-'+secId);
  if (sl) sl.textContent = labors[secId].val > 0 ? fmtBRL(labors[secId].val) : '';
  updateTotals();
}

function renameSection(secId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  const newName = prompt('Nome da seção:', sec.name);
  if (newName && newName.trim()) {
    sec.name = newName.trim();
    sec.custom = true;
    const el = document.getElementById('sectitle-'+secId);
    if (el) el.textContent = '📁 ' + sec.name;
  }
}

function removeSection(secId) {
  const secItems = items.filter(i => i.section_id === secId);
  if (secItems.length > 0 && !confirm('Remover esta seção e todos os seus itens?')) return;
  items = items.filter(i => i.section_id !== secId);
  sections = sections.filter(s => s.id !== secId);
  delete labors[secId];
  renderCart();
}

function getTotalLabor() {
  return Object.values(labors).reduce((s,l) => s + (l.val||0), 0);
}

function addNewSection() {
  const name = prompt('Nome da seção:', 'Nova seção ' + (sections.length + 1));
  if (!name || !name.trim()) return;
  const sec = { id: newSectionId(), name: name.trim(), category: name.trim(), custom: true };
  sections.push(sec);
  activeSectionId = sec.id;
  renderCart();
  if (window.innerWidth <= 768) document.getElementById('cartPanel').classList.add('open');
}


function addSectionForCat(category) {
  addNewSection();
}

function updateTotals() {
  const mat = items.reduce((s,i) => s+i.subtotal, 0);
  const labor = getTotalLabor();
  document.getElementById('totGrand').textContent = fmtBRL(mat + labor);
}

function compartilhar() {
  const client = document.getElementById('clientName').value.trim() || 'Cliente';
  const note = document.getElementById('noteField').value.trim();
  const address = document.getElementById('addressField').value.trim();
  const phone = document.getElementById('phoneField').value.trim();
  const labor = getTotalLabor();
  const laborDesc = document.getElementById('laborDesc').value.trim();
  let lines = ['*Orçamento FAGAL*'];
  if (address) lines.push(`📍 ${address}`);
  if (note) lines.push(`📝 ${note}`);
  if (phone) lines.push(`📞 ${phone}`);
  lines.push(`👤 ${client}`, '');
  const activeSecs = sections.filter(s => items.some(i => i.section_id === s.id));
  activeSecs.forEach(sec => {
    lines.push(`*${sec.name}:*`);
    const secItems = items.filter(i => i.section_id === sec.id);
    secItems.forEach(item => {
      const u = UNIT[item.unit]||item.unit;
      let q = item.unit==='m2' ? `${item.width}×${item.length}m = ${item.qty.toFixed(3)} m²`
            : item.unit==='m3' ? `${item.width}×${item.length}×${item.height}m = ${item.qty.toFixed(3)} m³`
            : `${item.qty} ${u}`;
      lines.push(`• ${item.material_name}: ${q} → ${fmtBRL(item.subtotal)}`);
    });
    const lab = labors[sec.id];
    if (lab && lab.val > 0) lines.push(`🔧 M.O.${lab.desc?' ('+lab.desc+')':''}: ${fmtBRL(lab.val)}`);
    const secMat = secItems.reduce((s,i) => s+i.subtotal, 0);
    lines.push(`_Subtotal: ${fmtBRL(secMat + (lab&&lab.val||0))}_`, '');
  });
  const mat = items.reduce((s,i) => s+i.subtotal, 0);
  lines.push(`*TOTAL: ${fmtBRL(mat+getTotalLabor())}*`);
    window.open(`https://wa.me/?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
}

async function submitSale(orcamento) {
  const client = document.getElementById('clientName').value.trim();
  if (!client) { alert('Informe o nome do cliente!'); document.getElementById('clientName').focus(); return; }
  if (!items.length) { alert('Adicione pelo menos um material!'); return; }
  const labor = getTotalLabor();
  const payload = {
    client,
    phone: document.getElementById('phoneField').value.trim(),
    address: document.getElementById('addressField').value.trim(),
    note: document.getElementById('noteField').value.trim(),
    paid: orcamento ? false : document.getElementById('paidCheck').checked,
    labor: getTotalLabor(),
    labor_desc: Object.entries(labors).filter(([,l])=>l.val>0).map(([cat,l])=>`${cat}: ${l.desc||'M.O.'}`).join(' | '),
    labors,
    orcamento,
    items: items.map(i => {
      const sec = sections.find(s => s.id === i.section_id);
      return {
        material_id: i.material_id, material_name: i.material_name,
        category: i.category, section_name: sec ? sec.name : i.category,
        unit: i.unit, qty: i.qty, unit_price: i.unit_price, subtotal: i.subtotal,
      };
    })
  };
  const saleId = document.getElementById('saleId').value;
  const url = saleId ? `/vendas/${saleId}/editar` : '/vendas/nova';
  const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  const data = await r.json();
  if (data.ok) window.location.href = `/vendas/${data.sale_id}`;
  else alert('Erro: ' + data.error);
}

// ── PREFILL (edit mode) ──
const prefill = {{ prefill | tojson }};

// ── INIT after DOM ready ──
document.addEventListener('DOMContentLoaded', () => {
  buildCatPills();
  filterMaterials('');
  if (prefill) {
    document.getElementById('clientName').value = prefill.client || '';
    document.getElementById('phoneField').value = prefill.phone || '';
    document.getElementById('addressField').value = prefill.address || '';
    document.getElementById('noteField').value = prefill.note || '';
    document.getElementById('laborDesc').value = prefill.labor_desc || '';
    if (prefill.labor) document.getElementById('laborVal').value = prefill.labor;
    if (prefill.items) {
      items = prefill.items.map(i => ({
        id: Date.now() + Math.random(),
        material_id: i.material_id,
        material_name: i.material_name,
        unit: i.unit,
        unit_price: i.unit_price,
        length: i.length || 1,
        width: i.width || 1,
        height: i.height || 1,
        qty: i.qty,
        subtotal: i.subtotal,
      }));
    }
    updateTotals();
  }
  renderCart();
});
</script>
